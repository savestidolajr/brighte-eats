services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: brighte
      POSTGRES_PASSWORD: brighte
      POSTGRES_DB: brighte_eats
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brighte -d brighte_eats"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  pgdata:
